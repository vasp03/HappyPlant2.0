# CI/CD Pipeline för Happy Plant 2.0 (Java/Gradle)
name: Java CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # DEL 1: CI - Körs vid Pull Request
  Build_Test:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: CI Passed message
        if: success()
        run: echo "Testerna gick igenom i PR!"

      - name: Install emulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29  # Lower to 29 or 30 for faster boot (API 34 is slow in software mode)
          arch: x86_64
          profile: pixel_4  # Or try a lighter profile like 'Nexus 6' if pixel_4 is too demanding
          cores: 4  # Increase to recommended 4 for better performance
          ram-size: 4096M  # Boost RAM for smoother boot (default is ~2048M)
          disk-size: 2048M  # Optional: Smaller disk to save resources
          disable-animations: true  # Speeds up boot by disabling UI animations
          emulator-boot-timeout: 900  # Increase timeout to 15 minutes if needed
          emulator-options: -no-snapshot-save -noaudio -no-boot-anim -gpu swiftshader_indirect  # Optimize flags (some are default)
          script: ./gradlew connectedDebugAndroidTest          
    
  # DEL 2: CD - Meddelande vid merge till Main
  Deploy-message:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Kod mergad till main. Redo för simulering av deployment."

  # DEL 3: CD - Staging & Production (Simulering)
  Deploy-Simulation:
    needs: Deploy-message
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deployar till staging..."
      - run: echo "Staging klar. Deployar till production..."
      - run: echo "Appen 'live' i produktion!"
