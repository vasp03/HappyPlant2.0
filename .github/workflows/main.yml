# CI/CD Pipeline för Happy Plant 2.0 (Java/Gradle)
name: Java CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # DEL 1: CI - Körs vid Pull Request
  Build_Test:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: CI Passed message
        if: success()
        run: echo "Testerna gick igenom i PR!"

      - name: Install emulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: '-no-window -no-audio -gpu swiftshader_indirect'
          wait-for-boot: true 
          script: ./gradlew connectedDebugAndroidTest  
    
  # DEL 2: CD - Meddelande vid merge till Main
  Deploy-message:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Kod mergad till main. Redo för simulering av deployment."

  # DEL 3: CD - Staging & Production (Simulering)
  Deploy-Simulation:
    needs: Deploy-message
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deployar till staging..."
      - run: echo "Staging klar. Deployar till production..."
      - run: echo "Appen 'live' i produktion!"
